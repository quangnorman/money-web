<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đồng hồ và số tiền tăng mỗi ngày</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #111827;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin: 0 0 28px;
      color: #4b5563;
      line-height: 1.6;
    }

    .clock-box,
    .money-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .clock {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .date {
      font-size: 18px;
      color: #374151;
    }

    .money {
      font-size: 44px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .note {
      color: #4b5563;
      line-height: 1.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
      overflow: hidden;
      border-radius: 16px;
    }

    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }

    th {
      background: #f3f4f6;
    }

    .today-row {
      background: #eefbf3;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Số tiền tui nợ Uynnn</h1>
    <p class="subtitle">
      Nợ gốc là <strong>10.000 VNĐ</strong>. Lãi <strong>5%</strong> so với ngày trước đó.
    </p>

    <div class="clock-box">
      <div class="label">Thời gian hiện tại</div>
      <div class="clock" id="clock">00:00:00</div>
      <div class="date" id="date">--/--/----</div>
    </div>

    <div class="money-box">
      <div class="label">Số tiền hôm nay</div>
      <div class="money" id="money">10.000 VNĐ</div>
      <div class="note" id="dayInfo">23-04-2026 là ngày bắt đầu.</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Ngày</th>
          <th>Số tiền</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const baseAmount = 10000;
    const growthRate = 0.05;

    // Ngày bắt đầu cố định: 23-04-2026
    // Lưu ý: JavaScript đếm tháng từ 0, nên 3 = tháng 4
    const fixedStartDate = new Date(2026, 3, 23);

    function formatCurrency(amount) {
      return new Intl.NumberFormat('vi-VN').format(Math.round(amount)) + ' VNĐ';
    }

    function formatDateDisplay(date) {
      return new Intl.DateTimeFormat('vi-VN', {
        weekday: 'long',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).format(date);
    }

    function formatShortDate(date) {
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = date.getFullYear();
      return `${day}-${month}-${year}`;
    }

    function getDaysPassed(startDate, currentDate) {
      const start = new Date(
        startDate.getFullYear(),
        startDate.getMonth(),
        startDate.getDate()
      );

      const current = new Date(
        currentDate.getFullYear(),
        currentDate.getMonth(),
        currentDate.getDate()
      );

      const diffMs = current - start;
      const oneDay = 24 * 60 * 60 * 1000;
      return Math.floor(diffMs / oneDay);
    }

    function updateClockAndMoney() {
      const now = new Date();

      // Nếu chưa tới 23-04-2026 thì vẫn giữ ở ngày 1
      const daysPassed = Math.max(0, getDaysPassed(fixedStartDate, now));
      const dayNumber = daysPassed + 1;
      const todayAmount = baseAmount * Math.pow(1 + growthRate, daysPassed);

      document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN');
      document.getElementById('date').textContent = formatDateDisplay(now);
      document.getElementById('money').textContent = formatCurrency(todayAmount);
      document.getElementById('dayInfo').innerHTML =
        `<strong>23-04-2026</strong> là ngày bắt đầu. Hôm nay là ngày <strong>${dayNumber}</strong>.`;

      renderTable(15, daysPassed);
    }

    function renderTable(totalDays, todayIndex) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      for (let i = 0; i < totalDays; i++) {
        const amount = baseAmount * Math.pow(1 + growthRate, i);
        const date = new Date(fixedStartDate);
        date.setDate(fixedStartDate.getDate() + i);

        const tr = document.createElement('tr');

        if (i === todayIndex) {
          tr.classList.add('today-row');
        }

        tr.innerHTML = `
          <td>
            Ngày ${i + 1} (${formatShortDate(date)})
            ${i === todayIndex ? ' - Hôm nay' : ''}
          </td>
          <td>${formatCurrency(amount)}</td>
        `;

        tbody.appendChild(tr);
      }
    }

    updateClockAndMoney();
    setInterval(updateClockAndMoney, 1000);
  </script>
</body>
</html>
